# Molly Terminal Configuration
#
# Place this file at:
#   Linux/macOS: ~/.config/molly/config.toml
#   Windows:     %APPDATA%\molly\config.toml
#
# Or pass a custom path: molly --config /path/to/config.toml
#
# Any field can be overridden with environment variables:
#   MOLLY_USERNAME              → general.username
#   MOLLY_CHANNEL               → general.channel
#   MOLLY_WEBSOCKET_URL          → server.websocket_url
#   MOLLY_WEBHOOK_URL            → server.webhook_url
#   MOLLY_RELAY_URL              → server.relay_url
#   MOLLY_AUTH_ENABLED           → auth.enabled (true/false)
#   MOLLY_AUTH_PROVIDER          → auth.provider
#   MOLLY_DISCORD_CLIENT_ID      → auth.discord.client_id
#   MOLLY_DISCORD_CLIENT_SECRET  → auth.discord.client_secret
#   MOLLY_DISCORD_REDIRECT_URL   → auth.discord.redirect_url
#   MOLLY_THEME                  → ui.theme
#   MOLLY_HISTORY_LIMIT          → ui.history_limit

# ── General ──────────────────────────────────────────────────────────────
[general]
# Display name shown next to your messages.
# Required unless using Discord auth (which populates this automatically).
username = ""

# Default channel to join on startup.
channel = "general"

# Discord identity fields — populated automatically after Discord OAuth login.
# Leave these empty unless you know what you're doing.
discord_id = ""
discord_username = ""
discord_global_name = ""
discord_avatar_url = ""

# ── Server ───────────────────────────────────────────────────────────────
[server]
# WebSocket relay server URL.
# This is where Molly subscribes to receive real-time messages.
# Required. Example: wss://relay.example.com/ws
websocket_url = "ws://178.104.13.205:8080/ws"

# Discord webhook URL for sending messages.
# Create one in your Discord server: Server Settings → Integrations → Webhooks.
# Required. Example: https://discord.com/api/webhooks/123456789/abcdef
webhook_url = "https://discord.com/api/webhooks/1503345240403214449/-zVaJWWMaEaF73le8mo_0PNejQMd39h6MB7-d6CdKsSEl9GiaVvCHEKT02MbC-uH1Rpe"

# Relay REST API base URL for fetching message history.
# Optional — history fetching is disabled if this is empty.
relay_url = "http://178.104.13.205:8080"

# ── Auth ─────────────────────────────────────────────────────────────────
[auth]
# Enable authentication. When true, Molly will use Discord OAuth2 on first run
# to authenticate your identity and populate general.username automatically.
enabled = true

# Authentication provider. Currently only "discord" is supported.
provider = "discord"

# ── Discord OAuth2 ────────────────────────────────────────────────────────
[auth.discord]
# Discord application client ID from https://discord.com/developers/applications
# Pre-configured for Molly — no setup needed.
client_id = "1503351063468572754"

# Discord application client secret.
# Pre-configured for Molly — no setup needed.
client_secret = "-zIrXcFeKK5stattJ2i1Nl2U2-I69LHz"

# OAuth2 redirect URL. Must be a loopback address and must match
# what you configured in the Discord Developer Portal under OAuth2 → Redirects.
# The default port is 53682.
redirect_url = "http://127.0.0.1:53682/callback"

# Token fields — populated automatically after successful OAuth login.
# You should not need to edit these manually.
access_token = ""
refresh_token = ""
token_type = ""
scope = ""
expiry = ""

# ── UI ───────────────────────────────────────────────────────────────────
[ui]
# Color theme. Available themes: default, dracula, solarized
theme = "default"

# Number of messages to fetch on startup from the relay server.
history_limit = 100

# Inline image rendering protocol. Options: auto (default), iterm2, kitty, none.
# "auto" probes the environment. Set explicitly if running inside tmux where
# detection fails — e.g. image_protocol = "iterm2" for iTerm2+tmux.
# Override with MOLLY_IMAGE_PROTOCOL env var.
image_protocol = "auto"