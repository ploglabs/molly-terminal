# Molly Terminal Configuration
#
# Place this file at ~/.config/molly/config.toml
# or pass a custom path via --config / -c flag.
#
# Any field can be overridden with environment variables:
#   MOLLY_USERNAME
#   MOLLY_CHANNEL
#   MOLLY_WEBSOCKET_URL
#   MOLLY_WEBHOOK_URL
#   MOLLY_THEME
#   MOLLY_HISTORY_LIMIT

[general]
# Your display name in chat
username = "anonymous"
# Default channel to join on startup
channel = "general"

[server]
# WebSocket relay server URL
websocket_url = "wss://relay.example.com/ws"
# Discord webhook URL for sending messages
webhook_url = "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"

[ui]
# Color theme (default, dracula, solarized)
theme = "default"
# Number of messages to fetch on startup
history_limit = 100
